<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Code マスター講座</title>
<style>
  :root {
    --bg: #0f1115;
    --bg2: #161a21;
    --bg3: #1e242e;
    --border: #2a3140;
    --text: #e6e9ef;
    --text-dim: #9aa4b2;
    --accent: #d97757;
    --accent-soft: rgba(217, 119, 87, 0.15);
    --green: #4ade80;
    --red: #f87171;
    --yellow: #fbbf24;
    --blue: #60a5fa;
    --mono: "SFMono-Regular", "Consolas", "Menlo", "Cascadia Code", monospace;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Noto Sans JP", Meiryo, sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    line-height: 1.75;
    display: flex;
    min-height: 100vh;
  }

  /* ===== Sidebar ===== */
  #sidebar {
    width: 300px;
    min-width: 300px;
    background: var(--bg2);
    border-right: 1px solid var(--border);
    height: 100vh;
    position: sticky;
    top: 0;
    overflow-y: auto;
    padding: 20px 14px;
    z-index: 50;
  }
  #sidebar .logo {
    display: flex; align-items: center; gap: 10px;
    padding: 6px 10px 16px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 14px;
  }
  #sidebar .logo .mark {
    width: 38px; height: 38px; border-radius: 9px;
    background: var(--accent);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--mono); font-weight: 700; font-size: 18px; color: #fff;
    flex-shrink: 0;
  }
  #sidebar .logo h1 { font-size: 15px; line-height: 1.3; }
  #sidebar .logo small { color: var(--text-dim); font-size: 11px; font-weight: normal; display: block; }

  #progress-wrap { padding: 4px 10px 14px; }
  #progress-label { font-size: 11px; color: var(--text-dim); display: flex; justify-content: space-between; margin-bottom: 5px; }
  #progress-bar { height: 7px; background: var(--bg3); border-radius: 4px; overflow: hidden; }
  #progress-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--accent), #f0a583); border-radius: 4px; transition: width .4s ease; }

  .nav-group-label { font-size: 10.5px; letter-spacing: .12em; color: var(--text-dim); text-transform: uppercase; padding: 12px 10px 4px; }
  .nav-item {
    display: flex; align-items: center; gap: 9px;
    padding: 8px 10px; border-radius: 8px; cursor: pointer;
    font-size: 13.5px; color: var(--text-dim);
    border: none; background: none; width: 100%; text-align: left;
    font-family: inherit; line-height: 1.45;
  }
  .nav-item:hover { background: var(--bg3); color: var(--text); }
  .nav-item.active { background: var(--accent-soft); color: var(--accent); font-weight: 600; }
  .nav-item .num {
    font-family: var(--mono); font-size: 11px; min-width: 20px;
    color: var(--text-dim); flex-shrink: 0;
  }
  .nav-item.active .num { color: var(--accent); }
  .nav-item .done { margin-left: auto; color: var(--green); font-size: 12px; flex-shrink: 0; }

  /* ===== Main ===== */
  #main { flex: 1; min-width: 0; }
  #content {
    max-width: 860px; margin: 0 auto;
    padding: 44px 40px 100px;
  }
  .chapter-kicker { color: var(--accent); font-family: var(--mono); font-size: 13px; margin-bottom: 8px; }
  h2.chapter-title { font-size: 30px; line-height: 1.35; margin-bottom: 10px; letter-spacing: .01em; }
  .chapter-lead { color: var(--text-dim); font-size: 15.5px; margin-bottom: 34px; }

  h3 { font-size: 20px; margin: 40px 0 14px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
  h4 { font-size: 16px; margin: 26px 0 10px; color: var(--text); }
  p { margin-bottom: 14px; font-size: 15px; }
  ul, ol { margin: 0 0 16px 24px; font-size: 15px; }
  li { margin-bottom: 6px; }
  strong { color: #fff; }
  a { color: var(--blue); }

  code {
    font-family: var(--mono); font-size: .88em;
    background: var(--bg3); border: 1px solid var(--border);
    padding: 1.5px 6px; border-radius: 5px; color: #f0c674;
    white-space: nowrap;
  }
  pre {
    background: #0b0d11; border: 1px solid var(--border);
    border-radius: 10px; padding: 16px 18px; overflow-x: auto;
    margin: 14px 0 20px; line-height: 1.6;
  }
  pre code { background: none; border: none; padding: 0; color: #d5dbe5; font-size: 13px; white-space: pre; }
  pre .cmt { color: #5c6773; }
  pre .prompt { color: var(--accent); font-weight: bold; }
  pre .out { color: #8b95a5; }
  pre .kw { color: #f0c674; }
  pre .str { color: #9fd48a; }

  .term-window { background: #0b0d11; border: 1px solid var(--border); border-radius: 10px; margin: 14px 0 20px; overflow: hidden; }
  .term-bar { background: var(--bg3); padding: 8px 14px; display: flex; gap: 6px; align-items: center; border-bottom: 1px solid var(--border); }
  .term-bar .dot { width: 11px; height: 11px; border-radius: 50%; }
  .term-bar .dot:nth-child(1){ background:#ff5f57; } .term-bar .dot:nth-child(2){ background:#febc2e; } .term-bar .dot:nth-child(3){ background:#28c840; }
  .term-bar span { color: var(--text-dim); font-size: 11.5px; font-family: var(--mono); margin-left: 8px; }
  .term-window pre { border: none; margin: 0; border-radius: 0; }

  table { width: 100%; border-collapse: collapse; margin: 14px 0 22px; font-size: 13.5px; }
  th, td { border: 1px solid var(--border); padding: 8px 12px; text-align: left; vertical-align: top; }
  th { background: var(--bg3); font-size: 12.5px; white-space: nowrap; }
  td:first-child code { white-space: nowrap; }
  .table-scroll { overflow-x: auto; }

  .callout {
    border: 1px solid var(--border); border-left: 4px solid var(--blue);
    background: var(--bg2); border-radius: 8px;
    padding: 13px 17px; margin: 16px 0 20px; font-size: 14px;
  }
  .callout.tip { border-left-color: var(--green); }
  .callout.warn { border-left-color: var(--yellow); }
  .callout.pro { border-left-color: var(--accent); }
  .callout .co-title { font-weight: 700; font-size: 13px; margin-bottom: 5px; display: flex; align-items: center; gap: 6px; }
  .callout p:last-child { margin-bottom: 0; }

  .kbd-row { display: flex; flex-wrap: wrap; gap: 8px; margin: 10px 0 18px; }
  kbd {
    font-family: var(--mono); font-size: 12px;
    background: var(--bg3); border: 1px solid var(--border);
    border-bottom-width: 3px; border-radius: 6px;
    padding: 3px 9px; color: var(--text);
  }

  /* ===== Quiz ===== */
  .quiz-box { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 24px 26px; margin-top: 48px; }
  .quiz-box > h3 { border: none; margin: 0 0 4px; padding: 0; display: flex; align-items: center; gap: 8px; }
  .quiz-sub { color: var(--text-dim); font-size: 13px; margin-bottom: 20px; }
  .quiz-q { margin-bottom: 26px; }
  .quiz-q .q-text { font-weight: 600; margin-bottom: 10px; font-size: 15px; }
  .quiz-q .q-text .q-num { color: var(--accent); font-family: var(--mono); margin-right: 6px; }
  .choice {
    display: block; width: 100%; text-align: left;
    background: var(--bg3); border: 1px solid var(--border);
    color: var(--text); border-radius: 8px;
    padding: 10px 14px; margin-bottom: 8px; cursor: pointer;
    font-size: 14px; font-family: inherit; line-height: 1.5;
  }
  .choice:hover:not(:disabled) { border-color: var(--accent); }
  .choice:disabled { cursor: default; opacity: .75; }
  .choice.correct { border-color: var(--green); background: rgba(74, 222, 128, .12); opacity: 1; }
  .choice.wrong { border-color: var(--red); background: rgba(248, 113, 113, .12); opacity: 1; }
  .q-explain { display: none; font-size: 13.5px; color: var(--text-dim); background: var(--bg3); border-radius: 8px; padding: 10px 14px; margin-top: 4px; }
  .q-explain.show { display: block; }
  .q-explain b { color: var(--green); }
  .quiz-result { display: none; text-align: center; padding: 14px; border-radius: 10px; font-weight: 700; margin-top: 8px; }
  .quiz-result.pass { display: block; background: rgba(74,222,128,.12); color: var(--green); border: 1px solid var(--green); }
  .quiz-result.fail { display: block; background: rgba(251,191,36,.1); color: var(--yellow); border: 1px solid var(--yellow); }
  .quiz-retry { margin-top: 10px; background: none; border: 1px solid var(--border); color: var(--text-dim); border-radius: 8px; padding: 7px 16px; cursor: pointer; font-family: inherit; font-size: 13px; }
  .quiz-retry:hover { color: var(--text); border-color: var(--text-dim); }

  /* ===== Pager ===== */
  .pager { display: flex; justify-content: space-between; gap: 14px; margin-top: 48px; }
  .pager button {
    background: var(--bg2); border: 1px solid var(--border); color: var(--text);
    padding: 13px 20px; border-radius: 10px; cursor: pointer;
    font-family: inherit; font-size: 14px; max-width: 48%;
    text-align: left; line-height: 1.4;
  }
  .pager button.next { text-align: right; margin-left: auto; }
  .pager button:hover { border-color: var(--accent); }
  .pager button small { display: block; color: var(--text-dim); font-size: 11.5px; }

  /* ===== Playground terminal ===== */
  #play-term {
    background: #0b0d11; border: 1px solid var(--border); border-radius: 0 0 10px 10px;
    padding: 16px 18px; font-family: var(--mono); font-size: 13px;
    height: 420px; overflow-y: auto; line-height: 1.65;
  }
  #play-term .line { white-space: pre-wrap; word-break: break-all; }
  #play-term .u { color: var(--accent); }
  #play-term .r { color: #d5dbe5; }
  #play-term .d { color: #8b95a5; }
  #play-term .g { color: var(--green); }
  #play-input-row { display: flex; align-items: center; gap: 8px; background: #0b0d11; border: 1px solid var(--border); border-top: none; border-radius: 0 0 10px 10px; padding: 10px 18px; }
  #play-input-row .ps1 { color: var(--accent); font-family: var(--mono); font-size: 13px; }
  #play-input { flex: 1; background: none; border: none; outline: none; color: var(--text); font-family: var(--mono); font-size: 13px; }
  .play-chips { display: flex; flex-wrap: wrap; gap: 7px; margin: 14px 0; }
  .play-chips button { background: var(--bg3); border: 1px solid var(--border); color: var(--text-dim); font-family: var(--mono); font-size: 12px; border-radius: 20px; padding: 4px 12px; cursor: pointer; }
  .play-chips button:hover { color: var(--accent); border-color: var(--accent); }

  /* ===== Cheatsheet ===== */
  #cheat-search {
    width: 100%; background: var(--bg2); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px 16px; color: var(--text);
    font-size: 14px; font-family: inherit; margin-bottom: 20px; outline: none;
  }
  #cheat-search:focus { border-color: var(--accent); }
  .cheat-row.hidden { display: none; }

  .badge { display: inline-block; font-size: 11px; font-family: var(--mono); border: 1px solid var(--border); border-radius: 5px; padding: 1px 7px; color: var(--text-dim); margin-left: 6px; vertical-align: middle; }

  #menu-toggle { display: none; }
  @media (max-width: 900px) {
    #sidebar { position: fixed; left: -320px; transition: left .25s ease; box-shadow: 4px 0 30px rgba(0,0,0,.5); }
    #sidebar.open { left: 0; }
    #content { padding: 70px 20px 80px; }
    #menu-toggle {
      display: block; position: fixed; top: 14px; left: 14px; z-index: 60;
      background: var(--bg2); border: 1px solid var(--border); color: var(--text);
      border-radius: 8px; padding: 8px 12px; cursor: pointer; font-size: 16px;
    }
    .pager button { max-width: 100%; }
  }
</style>
</head>
<body>

<button id="menu-toggle" onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button>

<nav id="sidebar">
  <div class="logo">
    <div class="mark">&gt;_</div>
    <h1>Claude Code マスター講座<small>ゼロから使いこなすまで</small></h1>
  </div>
  <div id="progress-wrap">
    <div id="progress-label"><span>学習進捗</span><span id="progress-pct">0%</span></div>
    <div id="progress-bar"><div id="progress-fill"></div></div>
  </div>
  <div id="nav-list"></div>
</nav>

<div id="main">
  <div id="content"></div>
</div>

<script>
"use strict";

/* =========================================================
   コンテンツ定義
   ========================================================= */
const CHAPTERS = [

/* ---------- 1 ---------- */
{
  id: "intro",
  title: "Claude Codeとは & セットアップ",
  lead: "Claude Codeの正体と、最初の5分で動かすまでの手順を押さえます。",
  body: `
<h3>Claude Codeとは</h3>
<p><strong>Claude Code</strong>は、Anthropicが提供する「ターミナルの中で動くAIコーディングエージェント」です。チャットボットと違い、単に答えを返すだけではなく、<strong>自分でファイルを読み・編集し・コマンドを実行し・テストを回し・コミットまで行う</strong>エージェントとして働きます。</p>
<ul>
  <li><strong>エージェント型</strong> — 「バグを直して」と頼めば、原因調査 → 修正 → テスト実行まで自律的に進めます。</li>
  <li><strong>ターミナル常駐</strong> — 普段のシェル・エディタ・gitワークフローにそのまま溶け込みます。VS CodeやJetBrainsの拡張、デスクトップアプリ、Web版(claude.ai/code)もあります。</li>
  <li><strong>コードベース理解</strong> — プロジェクト全体を検索・把握した上で、既存の書き方に合わせた変更を提案します。</li>
  <li><strong>拡張可能</strong> — スラッシュコマンド、スキル、hooks、MCP、サブエージェントで自分専用に育てられます。</li>
</ul>

<h3>インストール</h3>
<div class="term-window"><div class="term-bar"><div class="dot"></div><div class="dot"></div><div class="dot"></div><span>terminal</span></div>
<pre><code><span class="cmt"># npm でインストール(Node.js 18+ が必要)</span>
<span class="prompt">$</span> npm install -g @anthropic-ai/claude-code

<span class="cmt"># macOS / Linux はネイティブインストーラも利用可能</span>
<span class="prompt">$</span> curl -fsSL https://claude.ai/install.sh | bash

<span class="cmt"># バージョン確認・アップデート</span>
<span class="prompt">$</span> claude --version
<span class="prompt">$</span> claude update</code></pre></div>

<h3>初回起動とログイン</h3>
<div class="term-window"><div class="term-bar"><div class="dot"></div><div class="dot"></div><div class="dot"></div><span>terminal</span></div>
<pre><code><span class="cmt"># プロジェクトのルートで起動するのが基本</span>
<span class="prompt">$</span> cd my-project
<span class="prompt">$</span> claude</code></pre></div>
<p>初回はブラウザが開き、Claudeアカウント(Pro / Maxプラン)または Claude Console(API従量課金)でログインします。ログイン方法は後から <code>/login</code> で切り替えられます。</p>

<div class="callout tip"><div class="co-title">💡 TIP: 起動場所が大事</div>
<p>Claude Codeは<strong>起動したディレクトリ以下</strong>を作業対象として認識します。リポジトリのルートで起動しましょう。別のディレクトリを追加したいときはセッション中に <code>/add-dir</code> が使えます。</p></div>

<h3>最初にやるべきこと: <code>/init</code></h3>
<p>プロジェクトで最初にClaude Codeを使うときは、<code>/init</code> を実行しましょう。コードベースをスキャンして、ビルド方法・アーキテクチャ・規約をまとめた <code>CLAUDE.md</code>(プロジェクトの説明書)を自動生成してくれます。これが以後のすべての回答の精度を底上げします。</p>

<h3>動作確認をしてみよう</h3>
<div class="term-window"><div class="term-bar"><div class="dot"></div><div class="dot"></div><div class="dot"></div><span>claude</span></div>
<pre><code><span class="prompt">&gt;</span> このプロジェクトの構成を説明して

<span class="out">⏺ プロジェクトを調べます…
  (Globでファイル一覧 → READMEとpackage.jsonをRead)
  このプロジェクトは Next.js 15 + TypeScript のアプリで…</span></code></pre></div>
<p>このように、質問するだけでClaudeが必要なファイルを自分で探して読み、回答します。<strong>「何をどう調べるか」を人間が指示しなくてよい</strong>のがエージェントの強みです。</p>
`,
  quiz: [
    { q: "Claude Codeの特徴として最も正しいものは?",
      c: ["コード片を提案するだけの補完ツールである", "ファイル編集・コマンド実行・テストまで自律的に行うエージェントである", "ブラウザ専用のチャットボットである", "gitの代替ツールである"],
      a: 1, e: "Claude Codeは提案だけでなく、実際にファイルを編集しコマンドを実行して作業を完遂するエージェントです。" },
    { q: "新しいプロジェクトで最初に実行すると良いコマンドは?",
      c: ["/clear", "/init", "/cost", "/logout"],
      a: 1, e: "/init はコードベースを解析して CLAUDE.md を自動生成し、以後の回答精度を高めます。" },
    { q: "Claude Codeを起動する場所として推奨されるのは?",
      c: ["ホームディレクトリ", "どこでも同じ", "対象プロジェクトのルートディレクトリ", "/tmp"],
      a: 2, e: "起動ディレクトリ以下が作業対象になるため、プロジェクトルートでの起動が基本です。追加は /add-dir で可能です。" }
  ]
},

/* ---------- 2 ---------- */
{
  id: "basics",
  title: "基本操作 — 対話・編集・許可",
  lead: "日々の作業の8割を占める「頼む → 確認する → 承認する」の基本ループを身につけます。",
  body: `
<h3>基本の対話ループ</h3>
<p>Claude Codeの使い方はシンプルで、<strong>日本語(自然言語)でやってほしいことを書くだけ</strong>です。</p>
<div class="term-window"><div class="term-bar"><div class="dot"></div><div class="dot"></div><div class="dot"></div><span>claude</span></div>
<pre><code><span class="prompt">&gt;</span> ログイン画面にパスワード表示切替ボタンを追加して

<span class="out">⏺ LoginForm.tsx を読み込み…
⏺ Edit(app/components/LoginForm.tsx)
  ⎿ 変更内容のdiffが表示される</span>

<span class="out">  Do you want to make this edit? ❯ Yes / Yes, allow all edits / No</span></code></pre></div>
<p>Claudeがファイルを編集したりコマンドを実行しようとすると、<strong>diffや実行内容を見せて許可を求めてきます</strong>。内容を確認して承認する、これが基本ループです。</p>

<h3>許可(パーミッション)の3つのモード</h3>
<p><kbd>Shift</kbd>+<kbd>Tab</kbd> で入力欄下のモードが切り替わります。</p>
<div class="table-scroll"><table>
<tr><th>モード</th><th>動作</th><th>使いどころ</th></tr>
<tr><td><strong>通常モード</strong></td><td>編集・コマンド実行のたびに確認を求める</td><td>初めての操作、慎重に進めたいとき</td></tr>
<tr><td><strong>auto-accept</strong> <code>⏵⏵</code></td><td>ファイル編集を自動承認</td><td>信頼できる定型作業を任せるとき</td></tr>
<tr><td><strong>plan mode</strong> <code>⏸</code></td><td>ファイルを一切変更せず、調査と計画だけ行う</td><td>大きな変更の前に方針をレビューしたいとき</td></tr>
</table></div>

<div class="callout warn"><div class="co-title">⚠️ 承認は「読む」こと</div>
<p>承認ダイアログはただのEnter連打ポイントではありません。<strong>diffを読む習慣</strong>が品質と安全を守ります。特に <code>rm</code> や <code>git push</code> などの取り消しにくい操作は必ず内容を確認しましょう。</p></div>

<h3>ファイルの指定 — <code>@</code> メンション</h3>
<p><code>@</code> を入力するとファイルパスの補完が始まります。対象ファイルが分かっているときは明示した方が速くて正確です。</p>
<div class="term-window"><div class="term-bar"><div class="dot"></div><div class="dot"></div><div class="dot"></div><span>claude</span></div>
<pre><code><span class="prompt">&gt;</span> @src/utils/date.ts のformatDate関数にタイムゾーン対応を追加して</code></pre></div>

<h3>シェルコマンドの直接実行 — <code>!</code></h3>
<p>行頭に <code>!</code> を付けると、Claudeを介さず自分でシェルコマンドを実行できます。実行結果は会話のコンテキストに追加されるので、「この結果を見て」と続けられます。</p>
<div class="term-window"><div class="term-bar"><div class="dot"></div><div class="dot"></div><div class="dot"></div><span>claude</span></div>

    ["~/.claude/CLAUDE.md", "全プロジェクト共通の記憶"],
    [".claude/settings.json", "プロジェクト設定(共有)"],
    [".claude/settings.local.json", "プロジェクト設定(個人)"],
    ["~/.claude/settings.json", "ユーザー設定"],
    [".claude/commands/*.md", "カスタムコマンド"],
    [".claude/skills/*/SKILL.md", "スキル"],
    [".claude/agents/*.md", "サブエージェント"],
    [".mcp.json", "MCP設定(チーム共有)"],
  ]],
];

/* プレイグラウンドの疑似コマンド */
const PLAY_RESPONSES = {
  "help": [["d","利用できる疑似コマンド: claude, /help, /init, /clear, /model, /cost, /compact, # <メモ>, ! <cmd>, @<file>, exit"]],
  "claude": [
    ["r","╭──────────────────────────────────────────╮"],
    ["r","│ ✻ Welcome to Claude Code!                │"],
    ["r","│   /help でヘルプ、/init でCLAUDE.md生成  │"],
    ["r","╰──────────────────────────────────────────╯"],
    ["d","cwd: ~/my-project"]],
  "/help": [
    ["r","よく使うコマンド:"],
    ["r","  /init      CLAUDE.mdを生成"],
    ["r","  /clear     コンテキストをリセット"],
    ["r","  /compact   会話を要約して圧縮"],
    ["r","  /model     モデル切り替え"],
    ["r","  /cost      使用量を表示"],
    ["d","(実際にはもっとたくさんあります。本講座の第3章を参照)"]],
  "/init": [
    ["r","⏺ コードベースを解析しています…"],
    ["r","⏺ Glob(**/*) → 42 files"],
    ["r","⏺ Read(package.json, README.md, src/index.ts)"],
    ["g","✓ CLAUDE.md を作成しました。ビルドコマンドと規約を記録済み。"]],
  "/clear": [["g","✓ コンテキストをクリアしました。新しいタスクをどうぞ。"]],
  "/model": [
    ["r","現在のモデル: claude-opus-4-8"],
    ["r","  ❯ Opus   — 最高性能(設計・難タスク)"],
    ["r","    Sonnet — バランス(日常作業)"],
    ["r","    Haiku  — 高速・低コスト(単純作業)"]],
  "/cost": [
    ["r","Session cost:   $0.42"],
    ["r","Total tokens:   128,400 (in) / 9,200 (out)"],
    ["d","こまめな /clear がコスト最適化にも効きます"]],
  "/compact": [
    ["r","⏺ 会話を要約しています…"],
    ["g","✓ 会話を圧縮しました(78,000 → 4,100トークン)。作業を続けられます。"]],
  "exit": [["d","(疑似セッションを終了しました。claude で再開)"]],
};

/* =========================================================
   アプリ本体
   ========================================================= */
const LS_KEY = "cc-lecture-progress-v1";
let progress = {};
try { progress = JSON.parse(localStorage.getItem(LS_KEY) || "{}"); } catch(e) { progress = {}; }
function saveProgress(){ localStorage.setItem(LS_KEY, JSON.stringify(progress)); }

let current = location.hash ? location.hash.slice(1) : "intro";

function esc(s){ return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

function renderNav(){
  const nav = document.getElementById("nav-list");
  let html = '<div class="nav-group-label">カリキュラム</div>';
  CHAPTERS.forEach((ch, i) => {
    const done = progress[ch.id] ? '<span class="done">✓</span>' : "";
    html += `<button class="nav-item ${current===ch.id?'active':''}" onclick="go('${ch.id}')">
      <span class="num">${String(i+1).padStart(2,"0")}</span><span>${ch.title}</span>${done}</button>`;
  });
  html += '<div class="nav-group-label">リファレンス</div>';
  html += `<button class="nav-item ${current==='cheatsheet'?'active':''}" onclick="go('cheatsheet')"><span class="num">📋</span><span>チートシート</span></button>`;
  html += `<button class="nav-item ${current==='playground'?'active':''}" onclick="go('playground')"><span class="num">🖥</span><span>プレイグラウンド</span></button>`;
  nav.innerHTML = html;

  const doneCount = CHAPTERS.filter(c => progress[c.id]).length;
  const pct = Math.round(doneCount / CHAPTERS.length * 100);
  document.getElementById("progress-fill").style.width = pct + "%";
  document.getElementById("progress-pct").textContent = pct + "%";
}

function go(id){
  current = id;
  location.hash = id;
  document.getElementById("sidebar").classList.remove("open");
  render();
  window.scrollTo({top:0});
}
window.addEventListener("hashchange", () => {
  const id = location.hash.slice(1);
  if (id && id !== current) { current = id; render(); window.scrollTo({top:0}); }
});

function render(){
  renderNav();
  const c = document.getElementById("content");
  if (current === "cheatsheet") { c.innerHTML = renderCheatsheet(); bindCheatSearch(); return; }
  if (current === "playground") { c.innerHTML = renderPlayground(); bindPlayground(); return; }

  const idx = CHAPTERS.findIndex(ch => ch.id === current);
  const ch = CHAPTERS[idx] || CHAPTERS[0];

  let quizHtml = `<div class="quiz-box" id="quiz">
    <h3>✏️ 理解度チェック</h3>
    <p class="quiz-sub">全問正解でこの章がクリアになります(何度でも挑戦できます)。</p>`;
  ch.quiz.forEach((q, qi) => {
    quizHtml += `<div class="quiz-q" data-qi="${qi}">
      <div class="q-text"><span class="q-num">Q${qi+1}.</span>${esc(q.q)}</div>
      ${q.c.map((choice, ci) => `<button class="choice" onclick="answer('${ch.id}',${qi},${ci},this)">${esc(choice)}</button>`).join("")}
      <div class="q-explain" id="ex-${qi}"><b>解説:</b> ${esc(q.e)}</div>
    </div>`;
  });
  quizHtml += `<div class="quiz-result" id="quiz-result"></div>
    <button class="quiz-retry" onclick="render()">🔄 クイズをやり直す</button></div>`;

  const prev = CHAPTERS[idx-1], next = CHAPTERS[idx+1];
  let pager = '<div class="pager">';
  pager += prev ? `<button onclick="go('${prev.id}')"><small>← 前の章</small>${prev.title}</button>` : "<span></span>";
  pager += next ? `<button class="next" onclick="go('${next.id}')"><small>次の章 →</small>${next.title}</button>`
                : `<button class="next" onclick="go('cheatsheet')"><small>卒業 🎓</small>チートシートへ</button>`;
  pager += "</div>";

  c.innerHTML = `
    <div class="chapter-kicker">CHAPTER ${String(idx+1).padStart(2,"0")} / ${CHAPTERS.length}${progress[ch.id] ? ' <span style="color:var(--green)">✓ クリア済み</span>' : ""}</div>
    <h2 class="chapter-title">${ch.title}</h2>
    <p class="chapter-lead">${ch.lead}</p>
    ${ch.body}
    ${quizHtml}
    ${pager}`;
}

const quizState = {};
function answer(chId, qi, ci, btn){
  const ch = CHAPTERS.find(c => c.id === chId);
  const q = ch.quiz[qi];
  const qDiv = btn.closest(".quiz-q");
  const choices = qDiv.querySelectorAll(".choice");
  choices.forEach(b => b.disabled = true);
  const correct = ci === q.a;
  btn.classList.add(correct ? "correct" : "wrong");
  if (!correct) choices[q.a].classList.add("correct");
  qDiv.querySelector(".q-explain").classList.add("show");

  quizState[chId] = quizState[chId] || {};
  quizState[chId][qi] = correct;

  const answered = Object.keys(quizState[chId]).length;
  if (answered === ch.quiz.length) {
    const allCorrect = ch.quiz.every((_, i) => quizState[chId][i]);
    const res = document.getElementById("quiz-result");
    if (allCorrect) {
      res.className = "quiz-result pass";
      res.textContent = "🎉 全問正解!この章をクリアしました";
      progress[chId] = true;
      saveProgress();
      renderNav();
    } else {
      const score = ch.quiz.filter((_, i) => quizState[chId][i]).length;
      res.className = "quiz-result fail";
      res.textContent = `${score} / ${ch.quiz.length} 正解。解説を読んで、もう一度挑戦しましょう`;
    }
    delete quizState[chId];
  }
}

function renderCheatsheet(){
  let html = `<div class="chapter-kicker">REFERENCE</div>
    <h2 class="chapter-title">📋 チートシート</h2>
    <p class="chapter-lead">印刷・検索して使える早見表。キーワードで絞り込めます。</p>
    <input id="cheat-search" type="text" placeholder="🔍 検索(例: clear, 画像, mcp, 巻き戻し…)">`;
  CHEATSHEET.forEach(([group, rows]) => {
    html += `<h3 class="cheat-group">${group}</h3><div class="table-scroll"><table>
      <tr><th style="width:42%">コマンド / キー</th><th>説明</th></tr>`;
    rows.forEach(([cmd, desc]) => {
      html += `<tr class="cheat-row" data-text="${esc((cmd+" "+desc).toLowerCase())}"><td><code>${esc(cmd)}</code></td><td>${esc(desc)}</td></tr>`;
    });
    html += "</table></div>";
  });
  return html;
}
function bindCheatSearch(){
  const input = document.getElementById("cheat-search");
  input.addEventListener("input", () => {
    const v = input.value.toLowerCase().trim();
    document.querySelectorAll(".cheat-row").forEach(row => {
      row.classList.toggle("hidden", v && !row.dataset.text.includes(v));
    });
  });
}

function renderPlayground(){
  return `<div class="chapter-kicker">REFERENCE</div>
    <h2 class="chapter-title">🖥 プレイグラウンド</h2>
    <p class="chapter-lead">安全な疑似ターミナルで、講座に出てきたコマンドの雰囲気を試せます(実際には何も実行されません)。</p>
    <div class="play-chips">
      ${["claude","/help","/init","/model","/cost","/compact","/clear","# テストはmake testで実行","! npm test","@src/app.ts を説明して"].map(c =>
        `<button onclick="playRun('${c.replace(/'/g,"\\'")}')">${esc(c)}</button>`).join("")}
    </div>
    <div class="term-window" style="margin-bottom:0">
      <div class="term-bar"><div class="dot"></div><div class="dot"></div><div class="dot"></div><span>claude — 疑似ターミナル</span></div>
      <div id="play-term"><div class="line d">コマンドを入力するか、上のチップをクリックしてください。「help」で一覧。</div></div>
    </div>
    <div id="play-input-row"><span class="ps1">&gt;</span><input id="play-input" type="text" autocomplete="off" placeholder="コマンドを入力して Enter"></div>`;
}
function playPrint(lines){
  const term = document.getElementById("play-term");
  lines.forEach(([cls, text]) => {
    const div = document.createElement("div");
    div.className = "line " + cls;
    div.textContent = text;
    term.appendChild(div);
  });
  term.scrollTop = term.scrollHeight;
}
function playRun(cmd){
  cmd = cmd.trim();
  if (!cmd) return;
  playPrint([["u","> " + cmd]]);
  const key = cmd.toLowerCase();
  let out;
  if (PLAY_RESPONSES[key]) out = PLAY_RESPONSES[key];
  else if (cmd.startsWith("#")) out = [
    ["r","⎿ メモリに保存します: 「" + cmd.slice(1).trim() + "」"],
    ["r","  ❯ プロジェクト (./CLAUDE.md)"],
    ["r","    ユーザー (~/.claude/CLAUDE.md)"],
    ["g","✓ CLAUDE.md に追記しました"]];
  else if (cmd.startsWith("!")) out = [
    ["d","(bashモード: 「" + cmd.slice(1).trim() + "」を直接実行し、結果がコンテキストに入ります)"],
    ["r","$ " + cmd.slice(1).trim()],
    ["g","✓ 実行結果が会話に取り込まれました。「この結果を見て直して」と続けられます"]];
  else if (cmd.startsWith("@")) out = [
    ["r","⏺ Read(" + cmd.split(" ")[0].slice(1) + ")"],
    ["r","⏺ このファイルはアプリのエントリポイントで…(疑似応答)"],
    ["d","@でファイルを明示すると、探す手間が省けて速く正確になります"]];
  else if (cmd.startsWith("/")) out = [
    ["d","(未収録のコマンドです。実物では /help で全一覧が見られます)"]];
  else out = [
    ["r","⏺ 了解しました。「" + cmd + "」に取りかかります…(疑似応答)"],
    ["d","実物のClaude Codeなら、ここでファイル調査や編集が始まります"]];
  playPrint(out);
}
function bindPlayground(){
  const input = document.getElementById("play-input");
  input.addEventListener("keydown", e => {
    if (e.key === "Enter") { playRun(input.value); input.value = ""; }
  });
  input.focus();
}

render();
</script>
